<html lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FGHIJ Website</title>
    <style id="custom-css">body,html{height:100%}body{font-family:Arial,sans-serif;text-align:center;background-color:black;color:white}.med{color:white;}span{font-weight:700}#inputBox{font-size:1.5rem;padding:10px;margin:20px;text-align:center}#letters{font-size:2rem;letter-spacing:5px;display:flex;justify-content:center;position:relative}#letters span{display:inline-block;position:absolute;transition:transform .5s ease-in-out,color .5s linear;transform-origin:center}#wordCounter{font-size:1.2rem;margin-top:10px}@keyframes spinClockwise{0%{transform:translateX(var(--translate-x)) rotateY(0deg)}33%{transform:translateX(var(--translate-x)) rotateY(90deg);color:#7cfc00}to{transform:translateX(var(--translate-x)) rotateY(1turn);color:#7cfc00}}@keyframes spinClockwiseTranslateXexcluded{0%{transform:rotateY(0deg)}50%{transform:rotateY(90deg);color:#7cfc00}to{transform:rotateY(1turn);color:#7cfc00}}@keyframes redClockwise{0%{transform:rotateY(0deg)}33%{transform:rotateY(90deg);color:red}to{transform:rotateY(1turn);color:red}}@keyframes redCounterclockwise{0%{transform:rotateY(1turn)}50%{transform:rotateY(90deg);color:red}to{transform:rotateY(0deg);color:red}}@keyframes spinCounterclockwise{0%{transform:translateX(var(--translate-x)) rotateY(1turn)}66%{transform:translateX(var(--translate-x)) rotateY(90deg);color:#fff}to{transform:translateX(var(--translate-x)) rotateY(0deg);color:#fff}}@keyframes spinClockwiseNeutral{0%{transform:rotateY(0deg)}50%{transform:rotateY(90deg);color:#fff}to{transform:rotateY(1turn);color:#fff}}@keyframes pulse{0%,to{transform:translateX(var(--translate-x)) scale(1)}50%{transform:translateX(var(--translate-x)) scale(1.5)}}</style>
</head>
<body>
    <h1>FGHIJ Website</h1>
    <a href="" class="med" style="text-decoration: none;" id="a">Loading</a><h2 id="prompt">Prompt : </h2>
    <p id="wordCounter" style="--translate-x: 0;" class="med">Word count: 0</p>
    <p id="lettersCounter" class="low">(0 / 25)</p>
    <input type="text" id="inputBox" placeholder="Type here..." style="width: 390px;">
    <label for="order">Sort Order:</label>
    <select id="order">
        <option value="alphabetical">Alphabetical</option>
        <option value="qwerty">Keyboard Order</option>
        <option value="textFreq">Text Frequency</option>
        <option value="dictFreq">Dictionary Frequency</option>
        <option value="ewowFreq">EWOW Frequency</option>
        <option value="abcdeFreq">ABCDE Frequency</option>
    </select>
    <label for="reverse">Reverse:</label>
    <input type="checkbox" id="reverse">
    <div id="letters"></div>
    <script>
        const orders = {
            alphabetical: "abcdefghijklmnopqrstuvwxyz",
            qwerty: "qwertyuiopasdfghjklzxcvbnm",
            textFreq: "etaoinshrdlcumwfgypbvkjxqz",
            dictFreq: "esiarntolcdugpmhbyfvkwzxjq",
            ewowFreq: "etoainsrldhumcwygpfbvkxjzq",
            abcdeFreq: "eiatsnorlucdgmyhpbfwkvzxjq",
            placeholder: "notreadybcfghijklmpqsuvwxz"
        };
        function parsePrompt(str) {
            let promptData = ""; if (typeof str === 'string') { promptData = str; } else { promptData = str[0]; }
            const index = promptData.indexOf(" ");
            
            if (index === -1) {
                return "Error: Prompt data might be corrupted";
            }

            if (isNaN(parseInt(promptData.slice(0, index), 10))) {
                if (promptData.trim().startsWith('E')) {
                    return promptData;
                } else {
                    return "Error: Prompt data might be corrupted";
                }
            } else {
                return `Prompt ${promptData.slice(0, index)}: ${promptData.slice(index + 1)}`;
            }
        }
        document.getElementById("lettersCounter").class = "low";
        const container = document.getElementById("letters");
        const inputBox = document.getElementById("inputBox");
        const wordCounter = document.getElementById("wordCounter"); const lettersCounter = document.getElementById("lettersCounter");
        const alphabet = "abcdefghijklmnopqrstuvwxyz";
        const letterSpans = {};

        const url = "https://script.google.com/macros/s/AKfycby_PD70CNC1m9w3KTryFRfIZkODfZv24Zbnv5zZheqrISaj4vF6SddRYsh5BBamjcOy/exec";

        (async () => {
            try {
                const response = await fetch(url);
                const result = await response.json();

                if (Object.keys(result).length === 1 && result.hasOwnProperty('prompt')) {
                    document.getElementById("prompt").innerText = parsePrompt(result.prompt);
                    if (typeof result.prompt === 'string') { document.getElementById("a").innerText = "No URL Found"; document.getElementById("custom-css").textContent = `body{font-family:Arial,sans-serif;text-align:center;background:#3347da;color:#fff}.low{color:red}.med{color:#fff}.high{color:#7cfc00}span{font-weight:700}#inputBox{font-size:1.5rem;padding:10px;margin:20px;text-align:center}#letters{font-size:2rem;letter-spacing:5px;display:flex;justify-content:center;position:relative}#letters span{display:inline-block;position:absolute;transition:transform .5s ease-in-out,color .5s linear;transform-origin:center;color:#fff}#wordCounter{font-size:1.2rem;margin-top:10px}@keyframes spinClockwise{0%{transform:translateX(var(--translate-x)) rotateY(0deg)}33%{transform:translateX(var(--translate-x)) rotateY(90deg);color:#7cfc00}to{transform:translateX(var(--translate-x)) rotateY(1turn);color:#7cfc00}}@keyframes spinClockwiseTranslateXexcluded{0%{transform:rotateY(0deg)}50%{transform:rotateY(90deg);color:#7cfc00}to{transform:rotateY(1turn);color:#7cfc00}}@keyframes redClockwise{0%{transform:rotateY(0deg)}33%{transform:rotateY(90deg);color:red}to{transform:rotateY(1turn);color:red}}@keyframes redCounterclockwise{0%{transform:rotateY(1turn)}50%{transform:rotateY(90deg);color:red}to{transform:rotateY(0deg);color:red}}@keyframes spinCounterclockwise{0%{transform:translateX(var(--translate-x)) rotateY(1turn)}66%{transform:translateX(var(--translate-x)) rotateY(90deg);color:#fff}to{transform:translateX(var(--translate-x)) rotateY(0deg);color:#fff}}@keyframes spinClockwiseNeutral{0%{transform:rotateY(0deg)}50%{transform:rotateY(90deg);color:#fff}to{transform:rotateY(1turn);color:#fff}}@keyframes pulse{0%,to{transform:translateX(var(--translate-x)) scale(1)}50%{transform:translateX(var(--translate-x)) scale(1.5)}}` }
                    else { document.getElementById("a").innerText = `Watch FGHIJ ${result.prompt[2].slice(0, result.prompt[2].indexOf(" "))}`;
                document.getElementById("a").href = result.prompt[3].slice(0, result.prompt[3].indexOf(" "));
                document.getElementById("custom-css").textContent = `
body,html{height:100%}
body{
  background:${result.prompt[2].slice(result.prompt[2].indexOf(" ") + 1)};
  font-family:Arial,sans-serif;
  text-align:center;
  color:${result.prompt[3].split(" ")[2]}
}
.low{color:${result.prompt[3].split(" ")[3]}}
.med{color:${result.prompt[3].split(" ")[2]}}
.high{color:${result.prompt[3].split(" ")[1]}}
span{font-weight:700}
#inputBox{font-size:1.5rem;padding:10px;margin:20px;text-align:center}
#letters{font-size:2rem;letter-spacing:5px;display:flex;justify-content:center;position:relative}
#letters span{display:inline-block;position:absolute;transition:transform .5s ease-in-out,color .5s linear;transform-origin:center}
#wordCounter{font-size:1.2rem;margin-top:10px}
@keyframes spinClockwise{
  0%{transform:translateX(var(--translate-x)) rotateY(0deg)}
  33%{transform:translateX(var(--translate-x)) rotateY(90deg);color:${result.prompt[3].split(" ")[1]}}
  to{transform:translateX(var(--translate-x)) rotateY(1turn);color:${result.prompt[3].split(" ")[1]}}
}
@keyframes spinClockwiseTranslateXexcluded{
  0%{transform:rotateY(0deg)}
  50%{transform:rotateY(90deg);color:${result.prompt[3].split(" ")[1]}}
  to{transform:rotateY(1turn);color:${result.prompt[3].split(" ")[1]}}
}
@keyframes redClockwise{
  0%{transform:rotateY(0deg)}
  33%{transform:rotateY(90deg);color:${result.prompt[3].split(" ")[3]}}
  to{transform:rotateY(1turn);color:${result.prompt[3].split(" ")[3]}}
}
@keyframes redCounterclockwise{
  0%{transform:rotateY(1turn)}
  50%{transform:rotateY(90deg);color:${result.prompt[3].split(" ")[3]}}
  to{transform:rotateY(0deg);color:${result.prompt[3].split(" ")[3]}}
}
@keyframes spinCounterclockwise{
  0%{transform:translateX(var(--translate-x)) rotateY(1turn)}
  66%{transform:translateX(var(--translate-x)) rotateY(90deg);color:${result.prompt[3].split(" ")[2]}}
  to{transform:translateX(var(--translate-x)) rotateY(0deg);color:${result.prompt[3].split(" ")[2]}}
}
@keyframes spinClockwiseNeutral{
  0%{transform:rotateY(0deg)}
  50%{transform:rotateY(90deg);color:${result.prompt[3].split(" ")[2]}}
  to{transform:rotateY(1turn);color:${result.prompt[3].split(" ")[2]}}
}
@keyframes pulse{
  0%,to{transform:translateX(var(--translate-x)) scale(1)}
  50%{transform:translateX(var(--translate-x)) scale(1.5)}
}
`;}
                } else {
                    document.getElementById("prompt").innerText = "Error retrieving prompt: Can not retrieve prompt from external script!";
                    document.getElementById("a").innerText = "Only the FGHIJ macro and the CDEFG macro are supported";
                }
            } catch (error) {
                console.error("Error retrieving prompt:", error);
            }
        })();

        wordCounter.style.setProperty('--translate-x', 0);

        // Initialize letter display
        alphabet.split("").forEach((char, index) => {
            let span = document.createElement("span");
            const letterSpacing = container.clientWidth / 37.8;
            const newX = (index * letterSpacing) - ((26 / 2) - 0.5) * letterSpacing;
            span.innerText = char;
            span.style.transform = `translateX(${newX}px)`;
            span.style.setProperty('--translate-x', `${newX}px`);
            container.appendChild(span);
            letterSpans[char] = span;
        });

        let currentText = "";

        function countPangramability(input, alphabet) {
            const inputSet = new Set(input.toLowerCase());
            const alphabetSet = new Set(alphabet.toLowerCase());

            let count = 0;
            for (const char of alphabetSet) {
                if (inputSet.has(char)) {
                    count++;
                }
            }

            return count;
        }

        // Update word count
        function updateWordCount(text) {
  const words = text.trim().split(/\s+/).filter(w => w.match(/[a-z0-9]/i));
  const letterCount = countPangramability(text, alphabet); // keep 26 allowed

  // safe parse previous word count
  const prevWordMatch = (wordCounter.innerText || "").match(/Word count:\s*(\d+)/i);
  const previousCount = prevWordMatch ? parseInt(prevWordMatch[1], 10) : 0;

  // safe parse previous letter count
  let previousCountLetters = 0;
  const prevLetterMatch = (lettersCounter.innerText || "").trim().match(/\((\d+)\s*\/\s*\d+\)/);
  if (prevLetterMatch && prevLetterMatch[1]) previousCountLetters = parseInt(prevLetterMatch[1], 10);

  // update displays (you asked to keep "/ 25" text)
  wordCounter.innerText = `Word count: ${words.length}`;
  lettersCounter.innerText = `(${letterCount} / 25)`;

  // helper: reliably start an animation and set final color after it ends
  function triggerAnim(el, animName, finalColor) {
    if (!el) return;
    // remove any existing animation
    el.style.animation = "none";
    // force reflow so restart is reliable
    void el.offsetWidth;
    // start animation
    el.style.animation = `${animName} 0.5s ease-in-out forwards`;
    // remove any previous handler
    if (el._animEndHandler) {
      el.removeEventListener("animationend", el._animEndHandler);
      el._animEndHandler = null;
    }
    // apply final color on animationend (so keyframe color steps are visible)
    el._animEndHandler = () => {
      el.style.animation = "none";
      if (finalColor) el.style.color = finalColor;
      el.removeEventListener("animationend", el._animEndHandler);
      el._animEndHandler = null;
    };
    el.addEventListener("animationend", el._animEndHandler);
  }

  // WORD thresholds (14)
  if (words.length === 14 && previousCount !== 14) {
    triggerAnim(wordCounter, "spinClockwise", "high");
  } else if (words.length < 14 && previousCount >= 14) {
    triggerAnim(wordCounter, "spinCounterclockwise", "med");
  } else if (words.length > 14 && previousCount <= 14) {
    triggerAnim(wordCounter, "redClockwise", "low");
  } else {
    // no threshold crossing — keep color consistent
    if (words.length === 14) wordCounter.class = "high";
    else if (words.length > 14) wordCounter.class = "low";
    else wordCounter.class = "med";
  }

  // LETTER thresholds (25 target, allow 26 overflow)
  if (letterCount === 25 && previousCountLetters !== 25) {
    triggerAnim(lettersCounter, "spinClockwiseTranslateXexcluded", "high");
  } else if (letterCount < 25 && previousCountLetters >= 25) {
    // went from >=25 down to <25
    triggerAnim(lettersCounter, "redCounterclockwise", "low");
  } else if (letterCount > 25 && previousCountLetters <= 25) {
    // overflow occurred (26)
    triggerAnim(lettersCounter, "spinClockwiseNeutral", "med");
  } else {
    // no threshold crossing — keep color consistent
    if (letterCount >= 25) lettersCounter.class = "med";
    else lettersCounter.class = "low";
  }
}
// The secret sequence
const secret = ["n", "o", "t", "r", "e", "a", "d", "y"];
let secretPosition = 0;

document.addEventListener("keydown", (event) => {
    const key = event.key.toLowerCase();
    if (key === secret[secretPosition]) {
        secretPosition++;

        // If full sequence matched
        if (secretPosition === secret.length) {
            secretPosition = 0;
            triggerSecretOrder();
        }
    } else {
        secretPosition = 0;
    }
});

function triggerSecretOrder() {
    const select = document.getElementById("order");
    if (!select) return;
    const existing = select.querySelector('option[value="placeholder"]');

    if (!existing) {
        const opt = document.createElement("option");
        opt.value = "placeholder";
        opt.textContent = "Placeholder Order";
        select.appendChild(opt);
        select.value = "placeholder";
    }
}

        // Reordering letters based on the selected order
        function updateOrder() {
            const selectedOrder = document.getElementById("order").value;
            const reverse = document.getElementById("reverse").checked;
            const sortedLetters = orders[selectedOrder].split("");

            if (reverse) sortedLetters.reverse();

            sortedLetters.forEach((char, index) => {
                const span = letterSpans[char];
                const letterSpacing = container.clientWidth / 37.8;
                const newX = (index * letterSpacing) - ((26 / 2) - 0.5) * letterSpacing;
                span.style.setProperty('--translate-x', `${newX}px`);
                span.style.transform = `translateX(${newX}px)`;
            });
        }

        document.getElementById("order").addEventListener("change", updateOrder);
        document.getElementById("reverse").addEventListener("change", updateOrder);

        // Handle typing effects
        inputBox.addEventListener("input", function () {
            const newText = inputBox.value.toLowerCase();
            updateWordCount(newText);

            newText.split("").forEach(letter => {
                if (alphabet.includes(letter) && !currentText.includes(letter)) {
                    let span = letterSpans[letter];
                    span.style.animation = "none";
                    span.offsetHeight; // Force reflow to restart animation
                    span.style.animation = "spinClockwise 0.5s ease-in-out forwards";
                    span.class = "high";
                    setTimeout(() => span.style.animation = "none", 500);
                }
            });

            currentText.split("").forEach(letter => {
                if (alphabet.includes(letter) && !newText.includes(letter)) {
                    let span = letterSpans[letter];
                    span.style.animation = "none";
                    span.offsetHeight; // Force reflow
                    span.style.animation = "spinCounterclockwise 0.5s ease-in-out forwards";
                    span.class = "med";
                    setTimeout(() => span.style.animation = "none", 500);
                }
            });

            currentText = newText;
        });

        // Pulsing animation on keydown
        document.addEventListener("keydown", function (event) {
            const key = event.key.toLowerCase();
            if (alphabet.includes(key)) {
                const span = letterSpans[key];
                if (!span.style.animation.includes("spinClockwise") || !span.style.animation.includes("spinCounterclockwise")) {
                    span.style.animation = "none";
                    span.offsetHeight; // Force reflow
                    span.style.animation = "pulse 0.3s ease-in-out";

                }
            }
        });

        function adjustInputWidth() {
            inputBox.style.width = `${container.clientWidth / 1.8}px`;
        }

        window.addEventListener("resize", adjustInputWidth);
        window.addEventListener("load", adjustInputWidth);


    </script>
</body></html>
